version: '3'
services:
  db:
    build: 
      context: .
      dockerfile: ./db.Dockerfile
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: abcd#1234
      POSTGRES_USER: root
    ports:
      - '5432:5432'
  
  adminer:
    image: adminer
    restart: always
    ports:
      - 8081:8080

  api:
    ports:
      - 80:80
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      POSTGRES_PASSWORD: abcd#1234
      POSTGRES_USER: root
      POSTGRES_DB: users
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432